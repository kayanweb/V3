kind = "web"
previewPath = "/"
title = "PRO Nurse | نظام إدارة التمريض"
version = "1.0.0"
id = "artifacts/pro-nurse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22507

[services.development]
run = "pnpm --filter @workspace/pro-nurse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pro-nurse", "run", "build" ]
publicDir = "artifacts/pro-nurse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22507"
BASE_PATH = "/"
